{% extends "base.html" %}

{% block auth_content %}
<div class="landing-container">
    <div class="auth-card">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Reset Password</h2>
        <p class="subtitle" style="text-align: center;">Enter your ID and the system secret key</p>

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label class="form-label">Username / Student ID</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your ID" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">System Recovery Key</label>
                <input type="password" name="recovery_key" class="form-control" placeholder="Enter recovery key"
                    required>
                <small style="color: var(--text-muted); font-size: 0.75rem;">Contact admin if you don't know the
                    recovery key.</small>
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Reset Password</button>
        </form>
        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('login') }}"
                style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
